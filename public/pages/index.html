<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>KnitStitch Grid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Open+Sans:wght@400;600;700&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
  <script>
    // Small-screen guard: redirect phone-sized viewports to the warning page
    // before the editor or WASM solver loads. Runs in <head> so the editor
    // never paints on an unsupported screen. A sessionStorage bypass is set
    // by the warning page's "Continue" link so users can still proceed.
    (function () {
      try {
        var BYPASS_KEY = 'knitstitch:small-screen-bypass';
        var SMALL_BREAKPOINT = 768; // px — adjust to tune phone/tablet cutoff
        if (window.matchMedia('(max-width: ' + SMALL_BREAKPOINT + 'px)').matches
            && !sessionStorage.getItem(BYPASS_KEY)) {
          window.location.replace('/small-screen-warning.html');
        }
      } catch (e) { /* ignore — never block the editor on detection failure */ }
    })();
  </script>
</head>
<body class="page-knitstitch page-home">

  <!-- Boot loading overlay: shown immediately (before any JS runs) and
       hidden by main.js once the SolveSpace WASM solver finishes loading.
       Instantiating the solver blocks the main thread for a while (see
       AGENTS.md "SolveSpace WASM Solver Loading"), so this exists purely
       to communicate "loading" instead of the page appearing frozen/crashed. -->
  <div id="boot-loading-overlay" class="boot-loading-overlay" role="status" aria-live="polite">
    <div class="boot-loading-spinner" aria-hidden="true"></div>
    <p class="boot-loading-text">Loading sketch tools&hellip;</p>
  </div>

  <!-- #include file="partials/header.html" -->

  <div class="shell">
    <div id="app-container">

    <!-- Editor panel — bordered/rounded in normal view, flush in fullscreen -->
    <div class="editor-panel">

    <!-- Ribbon 2: Sketch tools — sits above the canvas in normal flow -->
    <div class="ribbon-bar--tools" id="tool-ribbon-sketch">
      <div class="ribbon-group">
        <span class="ribbon-group-label">Draw</span>
        <div class="ribbon-buttons">
          <button class="tool-btn" id="tool-select" title="Select tool"><span class="tool-icon" aria-hidden="true">&#x2B07;</span><span class="tool-label">Select</span></button>
          <button class="tool-btn" id="tool-fill" title="Fill tool"><span class="tool-icon" aria-hidden="true">&#x25A6;</span><span class="tool-label">Fill</span></button>
          <button class="tool-btn" id="tool-anchor" title="Anchor tool"><span class="tool-icon" aria-hidden="true">&#x2295;</span><span class="tool-label">Anchor</span></button>
          <button class="tool-btn" id="tool-line" title="Line tool"><span class="tool-icon" aria-hidden="true">&#x2571;</span><span class="tool-label">Line</span></button>
          <button class="tool-btn" id="tool-construction-line" title="Construction line"><span class="tool-icon" aria-hidden="true">&#x2504;</span><span class="tool-label">Construction</span></button>
          <button class="tool-btn" id="tool-circle" title="Circle tool"><span class="tool-icon" aria-hidden="true">&#x25CB;</span><span class="tool-label">Circle</span></button>
          <button class="tool-btn" id="tool-rectangle" title="Rectangle tool"><span class="tool-icon" aria-hidden="true">&#x25AD;</span><span class="tool-label">Rectangle</span></button>
          <button class="tool-btn" id="tool-bezier" title="B&eacute;zier curve"><span class="tool-icon" aria-hidden="true">&#x223F;</span><span class="tool-label">B&eacute;zier</span></button>
        </div>
      </div>
      <div class="ribbon-divider"></div>
      <div class="ribbon-group">
        <span class="ribbon-group-label">Constraints</span>
        <div class="ribbon-buttons">
          <button class="tool-btn" id="tool-dimension" title="Dimension constraint"><span class="tool-icon" aria-hidden="true">&#x2194;</span><span class="tool-label">Dimension</span></button>
          <button class="tool-btn" id="tool-hv" title="Horizontal/Vertical constraint"><span class="tool-icon" aria-hidden="true">&#x22A5;</span><span class="tool-label">H/V</span></button>
          <button class="tool-btn" id="tool-coincident" title="Coincident constraint"><span class="tool-icon" aria-hidden="true">&#x25CF;</span><span class="tool-label">Coincident</span></button>
          <button class="tool-btn" id="tool-equal" title="Equal length constraint"><span class="tool-icon" aria-hidden="true">&#x2261;</span><span class="tool-label">Equal</span></button>
          <button class="tool-btn" id="tool-parallel" title="Parallel constraint"><span class="tool-icon" aria-hidden="true">&#x2225;</span><span class="tool-label">Parallel</span></button>
          <button class="tool-btn" id="tool-perpendicular" title="Perpendicular constraint"><span class="tool-icon" aria-hidden="true">&#x2310;</span><span class="tool-label">Perpendicular</span></button>
          <button class="tool-btn" id="tool-midpoint" title="Midpoint constraint"><span class="tool-icon" aria-hidden="true">&#x22BF;</span><span class="tool-label">Midpoint</span></button>
        </div>
      </div>
      <div class="ribbon-divider"></div>
      <div class="ribbon-group">
        <span class="ribbon-group-label">Edit</span>
        <div class="ribbon-buttons">
          <button class="tool-btn tool-btn--sm" id="sketch-undo" title="Undo"><span class="tool-icon" aria-hidden="true">&#x21A9;</span><span class="tool-label">Undo</span></button>
          <button class="tool-btn tool-btn--sm" id="sketch-clear" title="Clear"><span class="tool-icon" aria-hidden="true">&#x2715;</span><span class="tool-label">Clear</span></button>
          <button class="tool-btn tool-btn--sm" id="sketch-delete" title="Delete"><span class="tool-icon" aria-hidden="true">&#x232B;</span><span class="tool-label">Delete</span></button>
        </div>
      </div>
    </div>

    <!-- Workspace shell: vertical workspace tabs on the left + canvas on the right -->
    <div class="workspace-layout">

      <!-- Ribbon 1: Workspace tabs — vertical strip on the left -->
      <div class="ribbon-bar ribbon-bar--workspace">
        <div class="ribbon-modes">
          <button class="workspace-btn active" onclick="setWorkspace('sketch', this)" data-workspace="sketch">
            <span class="icon">&#x270F;</span>
            <span class="label">Sketch</span>
          </button>
          <button class="workspace-btn" onclick="setWorkspace('row-counts', this)" data-workspace="row-counts">
            <span class="icon">&#9632;</span>
            <span class="label">Row Counts</span>
          </button>
          <button class="workspace-btn" onclick="setWorkspace('overlay', this)" data-workspace="overlay">
            <span class="icon">&#x1F5BC;</span>
            <span class="label">Overlay</span>
          </button>
          <button class="workspace-btn" onclick="setWorkspace('templates', this)" data-workspace="templates">
            <span class="icon">&#x1F4D0;</span>
            <span class="label">Templates</span>
          </button>
          <button class="workspace-btn" onclick="setWorkspace('options', this)" data-workspace="options">
            <span class="icon">&#x2699;</span>
            <span class="label">Options</span>
          </button>
        </div>
      </div>

      <!-- Canvas area — fills the remaining space, touches all edges -->
      <div class="canvas-area canvas-area--full">
        <div class="canvas-wrapper">
          <div class="canvas-content" id="konva-stage"></div>
        </div>

        <!-- Floating zoom control — top-left of canvas area -->
        <div class="zoom-control" id="zoom-control">
          <button class="zoom-btn" id="zoom-in" title="Zoom in">&#x2B;</button>
          <span class="zoom-level" id="zoom-level">100%</span>
          <button class="zoom-btn" id="zoom-out" title="Zoom out">&#x2212;</button>
          <div class="zoom-divider"></div>
          <button class="zoom-btn" id="zoom-fit" title="Fit to screen">&#x25A1;</button>
          <button class="zoom-btn" id="zoom-reset" title="Reset to 100%">&#x21BB;</button>
          <div class="zoom-divider"></div>
          <button class="zoom-btn" id="canvas-fullscreen" title="Fullscreen canvas">&#x26F6;</button>
        </div>

        <!-- Floating panels — workspace-specific content overlays the canvas -->
        <!-- #include file="partials/sidebar.html" -->
      </div>

    </div>

    </div>

  </div>
  </div>

  <script>
    function setWorkspace(ws, btn) {
      document.querySelectorAll('.workspace-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.workspace-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + ws).classList.add('active');
    }
  </script>
  <script type="module" src="../../src/main.js"></script>

  <!-- #include file="partials/footer.html" -->
</body>
</html>
