<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ReadMe — KnitStitch Grid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Open+Sans:wght@400;600;700&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body class="page-document page-readme" data-md-src="https://raw.githubusercontent.com/XanthiaJo/KnitStitch/master/README.md">

  <!-- #include file="partials/header.html" -->

  <section class="page-subheader">
    <div class="shell">
      <div class="page-subheader-inner">
        <h1>ReadMe</h1>
      </div>
    </div>
  </section>

  <main class="page-main">
    <div class="shell page-layout">

      <div class="container">
        <div class="md-loading" id="md-loading">Loading README…</div>
        <div class="markdown-body" id="md-content"></div>
      </div>

      <aside class="sidebar sidebar--sticky">
        <div class="container-sections">
          <section class="container-section--headed">
            <div class="container-section-header">About this page</div>
            <div class="container-section-body">
              <div class="body">This content is pulled directly from the GitHub repository so it always matches the latest README.</div>
            </div>
          </section>
          <section class="container-section--headed" id="md-toc-section">
            <div class="container-section-header">On this page</div>
            <div class="container-section-body">
              <nav class="container-actions" id="md-toc" aria-label="Page sections"></nav>
            </div>
          </section>
        </div>
      </aside>

    </div>
  </main>

  <!-- #include file="partials/footer.html" -->

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="/js/md-page.js"></script>

</html>
